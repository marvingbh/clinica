# docs/feature-manifest.yml — mapa canonico feature ⇄ fonte ⇄ docs.
# Glob: itens mais especificos/posteriores vencem (regra CODEOWNERS). Globs POSIX da raiz.
# Tres consumidores a partir de um arquivo:
#   1. check-drift.mjs constroi um indice inverso glob -> {feature, docs[]}.
#   2. Contrato do campo `feature` do frontmatter (todo feature e chave aqui; a pagina consta em docs:).
#   3. .github/CODEOWNERS e GERADO de features.*.owner + sources.
version: 1
defaults:
  docsRoot: docs-site/content/docs   # onde os caminhos de pagina abaixo resolvem
  ignoreGlobs:
    - "**/*.test.ts"
    - "**/*.test.tsx"
    - "**/__mocks__/**"
    - "**/*.stories.tsx"

