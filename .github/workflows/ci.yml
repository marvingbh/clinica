name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: clinica
          POSTGRES_PASSWORD: clinica_dev
          POSTGRES_DB: clinica_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U clinica"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://clinica:clinica_dev@localhost:5432/clinica_test
      NEXTAUTH_SECRET: ci-test-secret
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --force

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build
